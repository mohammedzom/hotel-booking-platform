services:
  api:
    build:
      context: .
      dockerfile: src/HotelBooking.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HotelBooking;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      JWT__Secret: "${JWT_SECRET}"
      JWT__Issuer: "HotelBookingApi"
      JWT__Audience: "HotelBookingClient"
      JWT__ExpiryMinutes: "15"
      Payment__Mode: "Mock"
      MockPayment__ConfirmUrlTemplate: "https://api.just-atta.site/api/v1/payment/mock-confirm/{0}?sessionId={1}"
      MockPayment__ProcessingDelayMs: "2000"
      PaymentUrls__SuccessUrlTemplate: "https://just-atta.site/booking/{0}/success"
      PaymentUrls__CancelUrlTemplate: "https://just-atta.site/booking/{0}/cancel"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"
      Swagger__Enabled: "true"
      Cors__AllowedOrigins__0: "https://just-atta.site"
      Cors__AllowedOrigins__1: "https://www.just-atta.site"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:80"
    volumes:
      - hotel_images:/app/wwwroot/images
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - hotel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - hotel-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hotel-network

  seq:
    image: datalust/seq:latest
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD}"
    volumes:
      - seq_data:/data
    networks:
      - hotel-network

volumes:
  sqlserver_data:
  seq_data:
  hotel_images:

networks:
  hotel-network:
    driver: bridge