services:
  api:
    build:
      context: .
      dockerfile: src/HotelBooking.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HotelBooking;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      JWT__Secret: "${JWT_SECRET}"
      JWT__Issuer: "HotelBookingApi"
      JWT__Audience: "HotelBookingClient"
      JWT__ExpiryMinutes: "15"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"
      Swagger__Enabled: "true"
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - hotel-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hotel-network

  seq:
    image: datalust/seq:latest
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD}"
    volumes:
      - seq_data:/data
    networks:
      - hotel-network

volumes:
  sqlserver_data:
  seq_data:

networks:
  hotel-network:
    driver: bridge