name: CD - Staging

on:
  workflow_run:
    workflows: ["CI"] # لازم يطابق name في ci.yml
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/SHA)"
        required: true
        default: "dev"
        type: string
      apply_migrations:
        description: "Run migrations before deploy (manual opt-in)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERFILE_PATH: src/HotelBooking.Api/Dockerfile
  DOCKER_CONTEXT: .

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.out.outputs.should_deploy }}
      checkout_ref: ${{ steps.out.outputs.checkout_ref }}
      apply_migrations: ${{ steps.out.outputs.apply_migrations }}
    steps:
      - id: out
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "checkout_ref=" >> "$GITHUB_OUTPUT"
              echo "apply_migrations=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "apply_migrations=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_dispatch
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "apply_migrations=${{ inputs.apply_migrations }}" >> "$GITHUB_OUTPUT"

  build_and_push:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          tag="staging-${short_sha}"
          echo "image_uri=${REGISTRY}/${IMAGE_NAME}:${tag}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${REGISTRY}/${IMAGE_NAME}:${tag}" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKER_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ghcr.io/${{ github.repository }}:staging-latest

  deploy_staging:
    runs-on: ubuntu-latest
    needs: [prepare, build_and_push]
    if: needs.prepare.outputs.should_deploy == 'true'
    environment:
      name: staging

    steps:
      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add known_hosts
        shell: bash
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh-keyscan -p "$port" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy + health check + rollback
        shell: bash
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}

          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
          APPLY_MIGRATIONS: ${{ needs.prepare.outputs.apply_migrations }}

          DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR }}
          DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE }}
          DEPLOY_SERVICE_NAME: ${{ vars.DEPLOY_SERVICE_NAME }}
          DEPLOY_IMAGE_ENV_VAR_NAME: ${{ vars.DEPLOY_IMAGE_ENV_VAR_NAME }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          DEPLOY_MIGRATION_COMMAND: ${{ vars.DEPLOY_MIGRATION_COMMAND }}

          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"

          ssh -p "$port" "${SSH_USER}@${SSH_HOST}" \
            "APP_DIR='${DEPLOY_APP_DIR}' \
             COMPOSE_FILE='${DEPLOY_COMPOSE_FILE}' \
             SERVICE_NAME='${DEPLOY_SERVICE_NAME}' \
             IMAGE_ENV_VAR_NAME='${DEPLOY_IMAGE_ENV_VAR_NAME}' \
             HEALTHCHECK_URL='${DEPLOY_HEALTHCHECK_URL}' \
             MIGRATION_COMMAND='${DEPLOY_MIGRATION_COMMAND}' \
             IMAGE_URI='${IMAGE_URI}' \
             APPLY_MIGRATIONS='${APPLY_MIGRATIONS}' \
             GHCR_PULL_USERNAME='${GHCR_PULL_USERNAME}' \
             GHCR_PULL_TOKEN='${GHCR_PULL_TOKEN}' \
             bash -s" <<'REMOTE'
          set -Eeuo pipefail

          : "${APP_DIR:?DEPLOY_APP_DIR is required}"
          : "${HEALTHCHECK_URL:?DEPLOY_HEALTHCHECK_URL is required}"

          COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.yml}"
          SERVICE_NAME="${SERVICE_NAME:-api}"
          IMAGE_ENV_VAR_NAME="${IMAGE_ENV_VAR_NAME:-HOTELBOOKING_IMAGE}"

          cd "$APP_DIR"

          [ -f "$COMPOSE_FILE" ] || { echo "Compose file not found: $COMPOSE_FILE"; exit 1; }

          ENV_FILE=".env"
          touch "$ENV_FILE"
          cp "$ENV_FILE" "${ENV_FILE}.rollback"

          set_kv() {
            local key="$1" val="$2"
            if grep -qE "^${key}=" "$ENV_FILE"; then
              sed -i "s#^${key}=.*#${key}=${val}#g" "$ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$val" >> "$ENV_FILE"
            fi
          }

          rollback_app() {
            echo "Rolling back app..."
            if [ -f "${ENV_FILE}.rollback" ]; then
              cp "${ENV_FILE}.rollback" "$ENV_FILE"
              docker compose -f "$COMPOSE_FILE" up -d "$SERVICE_NAME" || true
            fi
          }

          if [ -n "${GHCR_PULL_USERNAME:-}" ] && [ -n "${GHCR_PULL_TOKEN:-}" ]; then
            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
          fi

          set_kv "$IMAGE_ENV_VAR_NAME" "$IMAGE_URI"

          docker compose -f "$COMPOSE_FILE" config -q

          if [ "${APPLY_MIGRATIONS:-false}" = "true" ]; then
            if [ -z "${MIGRATION_COMMAND:-}" ]; then
              echo "DEPLOY_MIGRATION_COMMAND is empty. Refusing migration."
              exit 1
            fi
            bash -lc "$MIGRATION_COMMAND"
          else
            echo "Skipping migrations (default-safe)."
          fi

          docker compose -f "$COMPOSE_FILE" pull "$SERVICE_NAME" || true
          docker compose -f "$COMPOSE_FILE" up -d "$SERVICE_NAME"

          ok=0
          for i in $(seq 1 24); do
            if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
              ok=1; break
            fi
            sleep 5
          done

          if [ "$ok" -ne 1 ]; then
            rollback_app
            exit 1
          fi

          echo "Staging deploy succeeded: $IMAGE_URI"
REMOTE
